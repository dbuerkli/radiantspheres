<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiant Spheres — Frontier Advisory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #faf5f2;
            font-family: "Montserrat", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: #2c2c2c;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: 180px;
            height: 180px;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            color: #6b6b6b;
            margin-bottom: 2rem;
        }

        .email a {
            color: #c96a5a;
            text-decoration: none;
            font-size: 1rem;
            letter-spacing: 0.04em;
        }

        .email a:hover {
            text-decoration: underline;
        }

        .address {
            position: fixed;
            bottom: 1rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.65rem;
            color: #b5b5b5;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="RS-Logo-BG.png" alt="Radiant Spheres — Frontier Advisory" class="logo">
        <p class="email"><a href="mailto:inquiries@radiantspheres.com">inquiries@radiantspheres.com</a></p>
    </div>
    <div class="address">Radiant Spheres GmbH · In der Breiti 2 · 8047 Zurich · Switzerland</div>
</body>
</html>
